<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FA Admin{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; line-height: 1.5; }
        a { color: #6bb5ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        nav { background: #1a1a1a; border-bottom: 1px solid #333; padding: 12px 0; margin-bottom: 24px; }
        nav .container { display: flex; gap: 24px; align-items: center; }
        nav a { color: #999; font-size: 14px; }
        nav a:hover, nav a.active { color: #fff; text-decoration: none; }
        nav .brand { font-weight: 700; color: #fff; font-size: 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; text-align: center; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #fff; }
        .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #1a1a1a; color: #888; font-size: 12px; text-transform: uppercase; }
        tr:hover { background: #1a1a1a; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .badge-a { background: #1a3a1a; color: #4ade80; }
        .badge-b { background: #3a3a1a; color: #facc15; }
        .badge-c { background: #3a1a1a; color: #f87171; }
        .badge-status { background: #1a2a3a; color: #60a5fa; }
        .score { font-family: monospace; }
        .truncate { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .filters a { padding: 4px 12px; background: #222; border-radius: 4px; font-size: 13px; }
        .filters a.active { background: #333; color: #fff; }
        .detail-section { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .detail-section h3 { margin-bottom: 12px; color: #fff; }
        .draft-text { background: #111; padding: 16px; border-radius: 4px; white-space: pre-wrap; font-size: 14px; }
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: #4ade80; border-radius: 4px; }
        .ingest-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .ingest-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; }
        .ingest-card h4 { margin-bottom: 10px; color: #fff; }
        .ingest-meta { color: #888; font-size: 12px; margin-bottom: 12px; }
        .ingest-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
        .ingest-scopes { margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .ingest-scope { display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; font-size: 12px; color: #aaa; padding: 3px 0; }
        .muted { color: #666; font-size: 12px; }
        .button-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .action-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .action-btn:hover { background: #2a2a2a; }
        .code-block { background: #111; border: 1px solid #222; border-radius: 6px; padding: 12px; white-space: pre-wrap; font-size: 13px; margin-top: 10px; }
        .cards { display: grid; gap: 16px; }
        .job-card { background: #171717; border: 1px solid #2d2d2d; border-radius: 10px; padding: 18px; }
        .job-card-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 10px; }
        .job-card-title { font-size: 18px; font-weight: 700; line-height: 1.35; }
        .job-card-title a { color: #fff; }
        .job-card-title a:hover { color: #6bb5ff; text-decoration: none; }
        .job-card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .chip { display: inline-flex; gap: 6px; align-items: center; padding: 4px 8px; border-radius: 999px; background: #222; border: 1px solid #303030; font-size: 12px; color: #c8c8c8; }
        .chip-good { background: #13261a; border-color: #23452e; color: #7fe39f; }
        .chip-warn { background: #2c2611; border-color: #52451b; color: #f8d56d; }
        .chip-bad { background: #301617; border-color: #5a292b; color: #ff8c8c; }
        .job-card-body { display: grid; gap: 12px; }
        .job-card-desc { color: #b8b8b8; font-size: 14px; }
        .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
        .job-panel { background: #111; border: 1px solid #252525; border-radius: 8px; padding: 12px; }
        .job-panel h4 { font-size: 12px; color: #8b8b8b; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.04em; }
        .job-panel p { font-size: 14px; color: #ddd; }
        .mini-list { display: grid; gap: 6px; }
        .mini-list div { font-size: 13px; color: #c4c4c4; }
        .mini-list strong { color: #fff; }
        .empty-state { color: #777; font-size: 14px; padding: 24px 0; }
        .inline-status { font-size: 12px; color: #9ca3af; margin-top: 8px; }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <span class="brand">FA</span>
            <a href="/admin">Dashboard</a>
            <a href="/admin/pipeline">Pipeline</a>
            <a href="/admin/jobs">All Jobs</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        async function copyText(text) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (err) {
                console.error(err);
            }
        }

        async function sendToAgent(candidateId, statusId) {
            const node = statusId ? document.getElementById(statusId) : null;
            if (node) {
                node.textContent = 'Sending to agent...';
            }
            try {
                const response = await fetch(`/jobs/${candidateId}/send-to-agent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Agent handoff failed');
                }
                if (node) {
                    node.textContent = `Sent to agent (${data.status_code})`;
                }
            } catch (err) {
                if (node) {
                    node.textContent = err.message || 'Agent handoff failed';
                }
                console.error(err);
            }
        }
    </script>
</body>
</html>
