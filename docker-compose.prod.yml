services:
  app:
    image: ghcr.io/kirillbaranov/freelance-assistant:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fa
      POSTGRES_PASSWORD: fa
      POSTGRES_DB: freelance_assistant
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
